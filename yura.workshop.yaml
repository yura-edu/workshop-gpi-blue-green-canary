# yura.workshop.yaml — declarative grader config
# Spec: docs/grader-workers-spec.md §6
# Generated from prisma/seeds/workshop-templates.seed.ts

schema_version: "1.0"
workshop:
  id: gpi-blue-green-canary
  title: "Blue-Green / Canary Deployment"
  type: configuration
  language: polyglot
  passing_threshold: 70
  base_branch: main
submission:
  source: workshop_link
  required_inputs:
    - type: github_repo_url
      label: "URL del repositorio"
      required: true
    - type: github_pr_url
      label: "URL del Pull Request"
      required: true
evaluation_profile:
  - metric_id: k8s_manifest_valid
    weight: 30
    threshold: 1
    config:
      tool: kubeconform
      paths:
        - k8s/
        - manifests/
  - metric_id: rollback_procedure_documented
    weight: 25
    threshold: 1
    config:
      target_file: docs/deploy-strategy.md
      required_sections:
        - "## Rollback"
  - metric_id: health_check_configured
    weight: 25
    threshold: 1
    config:
      manifests_glob:
        - "k8s/**/*.yaml"
        - "compose*.yml"
  - metric_id: ci_pipeline_passes
    weight: 20
    threshold: 1
    config:
      provider: github_actions
      required_workflows: []
      mode: all_required_pass
      timeout_minutes_after_submit: 10
